<section class="page-header">

<section class="container">

<form action="https://formsubmit.co/blakehorrocks7@gmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">

    <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
    >

    <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
    >

    <textarea
        name="message"
        rows="6"
        placeholder="Your Message"
        required
    ></textarea>

    <button type="submit">
        Send Message

</form>
